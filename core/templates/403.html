{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 | YourSideAnime</title>

    <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <script>
        (function () {
            const tema = localStorage.getItem("theme") || "dark";
            document.body.classList.remove("dark-mode", "light-mode");
            document.body.classList.add(tema === "dark" ? "dark-mode" : "light-mode");
        })();
    </script>

    <style>
      .error-page {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .error-code {
        font-size: 8rem;
        font-weight: 700;
        color: red;
        line-height: 1;
      }
    </style>
</head>

<body>
  <header class="d-none d-md-block">
    {% include 'components/navbar.html' %}
  </header>
  <header class="d-block d-md-none">
    {% include 'components/mobile_nav.html' %}
  </header>

  <div class="container py-4">
    <div class="error-page">
      <div class="text-center">
        <div class="error-code">403</div>
        <h2 class="mt-3 mb-2">Acceso prohibido</h2>
        <p class="text-secondary mb-4">No tienes permiso para acceder a esta página.</p>
        <a href="{% url 'animes:home' %}" class="btn btn-primary px-4">Volver al inicio</a>
      </div>
    </div>
  </div>

  <footer class="mt-5">
    {% include 'components/footer.html' %}
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
