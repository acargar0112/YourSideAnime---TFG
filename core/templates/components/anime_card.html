<div class="anime-card card bg-dark text-white border-0 h-100">

    <a href="{% url 'animes:ficha' anime.id %}">
        <img src="{{ anime.imagen_url }}"
             class="card-img-top img-fluid"
             alt="{{ anime.titulo }}"
             style="object-fit: cover; height: 250px;">
    </a>

    <div class="card-body d-flex flex-column">

        <h5 class="card-title text-truncate mb-2">{{ anime.titulo }}</h5>

        <p class="text-secondary small mb-2">
            Estado: {{ anime.get_estado_display }}
        </p>

        <div class="mt-auto">
            {% include 'components/rating.html' with rating=anime.rating %}
        </div>

    </div>
</div>
