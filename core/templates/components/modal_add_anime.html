<div class="modal fade" id="modalAddAnime" tabindex="-1" aria-labelledby="modalAddAnimeLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-secondary">

            <div class="modal-header border-secondary">
                <h5 class="modal-title fw-bold" id="modalAddAnimeLabel">Añadir Anime</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form method="POST" enctype="multipart/form-data" action="{% url 'animes:add' %}">
                {% csrf_token %}

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input type="text" name="titulo" class="form-control bg-dark text-white border-secondary" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Imagen</label>
                        <input type="file" name="imagen" class="form-control bg-dark text-white border-secondary">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Estado</label>
                        <select name="estado" class="form-select bg-dark text-white border-secondary">
                            <option value="viendo">Viendo</option>
                            <option value="visto">Visto</option>
                            <option value="dropeado">Dropeado</option>
                            <option value="whitelist">Whitelist</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Rating</label>
                        <select name="rating" class="form-select bg-dark text-white border-secondary">
                            <option value="1">★☆☆☆☆</option>
                            <option value="2">★★☆☆☆</option>
                            <option value="3">★★★☆☆</option>
                            <option value="4">★★★★☆</option>
                            <option value="5">★★★★★</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Añadir</button>
                </div>

            </form>
        </div>
    </div>
</div>
