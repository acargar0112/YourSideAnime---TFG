{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | YourSideAnime</title>

    <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <script>
        (function() {
            // Obtiene el tema guardado en localStorage. Si no existe, usa "dark" por defecto.
            const tema = localStorage.getItem("theme") || "dark";
            const esOscuro = tema === "dark";

            // Limpia clases y aplica la clase correspondiente al tema
            document.body.classList.remove("dark-mode", "light-mode");
            document.body.classList.add(esOscuro ? "dark-mode" : "light-mode");
        })();

    </script>

    <style>
        .error-page {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: red;
            line-height: 1;
        }
    </style>
</head>

<body>
    <header class="d-none d-md-block">
        {% include 'components/navbar.html' %}
    </header>
    <header class="d-block d-md-none">
        {% include 'components/mobile_nav.html' %}
    </header>
    <div class="container py-4">
        <div class="error-page">
        <div class="text-center">
            <div class="error-code">404</div>
            <h2 class="mt-3 mb-2">Página no encontrada</h2>
            <p class="text-secondary mb-4">Esta página no existe o ha sido movida.</p>
            <a href="{% url 'animes:home' %}" class="btn btn-primary px-4">Volver al inicio</a>
        </div>
        </div>
    </div>

    <footer class="mt-5">
        {% include 'components/footer.html' %}
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function CambioTema() {
            // Detecta si actualmente está en modo oscuro
            const esOscuro = document.body.classList.contains("dark-mode");

            // Cambia entre el modo oscuro (dark-mode) y el modo claro (light-mode)
            document.body.classList.remove("dark-mode", "light-mode");
            document.body.classList.add(esOscuro ? "light-mode" : "dark-mode")

            // Guarda el nuevo tema en localStorage
            localStorage.setItem("theme", esOscuro ? "light" : "dark");

            // Cambia los iconos del botón de cambio de tema
            document.querySelectorAll(".icono-tema").forEach(icono => {
                icono.classList.remove("bi-sun-fill", "bi-moon-fill");
                icono.classList.add(esOscuro ? "bi-moon-fill" : "bi-sun-fill");
            });
        }

        // Al cargar la página, aplica el tema guardado en el localStorage y actualiza los iconos dependiendo del tema guardado.
        document.addEventListener("DOMContentLoaded", () => {
            const tema = localStorage.getItem("theme") || "dark";
            const esOscuro = tema === "dark";

            // Aplica el tema al body
            document.body.classList.remove("dark-mode", "light-mode");
            document.body.classList.add(esOscuro ? "dark-mode" : "light-mode");

            // Adopta el icono respecto al tema actual
            document.querySelectorAll(".icono-tema").forEach(icono => {
                icono.classList.remove("bi-sun-fill", "bi-moon-fill");
                icono.classList.add(esOscuro ? "bi-sun-fill" : "bi-moon-fill");
            });
        });
    </script>




</body>
</html>
