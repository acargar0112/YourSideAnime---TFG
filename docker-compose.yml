version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: yoursideanime
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  web:
    build: .
    container_name: django_app
    command: gunicorn YourSideAnime.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - db
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles
      - /etc/letsencrypt/live/yoursideanime.duckdns.org:/etc/letsencrypt/live/yoursideanime.duckdns.org:ro
      - /etc/letsencrypt/archive/yoursideanime.duckdns.org:/etc/letsencrypt/archive/yoursideanime.duckdns.org:ro
    depends_on:
      - web

volumes:
  mysql_data:
  static_volume:
