{% extends "base.html" %}

{% block title %}Cerrar sesión · YourSideAnime{% endblock %}

{% block content %}

<h2 class="text-center mb-4">¿Seguro que quieres cerrar sesión?</h2>

<div class="d-flex justify-content-center gap-3">
    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger">Cerrar sesión</button>
    </form>

    <a href="{% url 'users:profile' %}" class="btn btn-secondary">Cancelar</a>
</div>

{% endblock %}
