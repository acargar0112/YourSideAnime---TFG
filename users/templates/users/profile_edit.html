{% extends "base.html" %}
{% load static %}

{% block title %}Editar Perfil · YourSideAnime{% endblock %}

{% block content %}

{% if messages %}
<div class="container mt-3">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show d-flex justify-content-between align-items-center" role="alert">
            <span>{{ message }}</span>
            <button type="button" class="btn-close ms-3" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    {% endfor %}
</div>
{% endif %}

<div class="row g-4">

    <div class="col-12 col-md-4 d-flex flex-column align-items-center">

        <img src="{% if request.user.avatar %}{{ request.user.avatar.url }}{% else %}{% static 'img/default_avatar.png' %}{% endif %}"
             alt="Foto de perfil"
             class="rounded-circle border"
             style="width: 140px; height: 140px; object-fit: cover;">

    </div>

    <div class="col-12 col-md-8">

        <div class="p-4 bg-dark border border-secondary rounded">

            <form method="POST" enctype="multipart/form-data" class="d-flex flex-column gap-3">
                {% csrf_token %}

                <label class="btn btn-secondary mt-3 w-50">
                    Cambiar foto
                    <input type="file" name="avatar" class="d-none" id="avatarInput">
                </label>

                <div>
                    <label class="form-label">Nombre</label>
                    <input type="text" name="username" class="form-control"
                           value="{{ request.user.username }}">
                </div>

                <div>
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ request.user.email }}">
                </div>

                <div>
                    <label class="form-label">Biografía</label>
                    <textarea name="bio" rows="4" class="form-control">{{ request.user.bio }}</textarea>
                </div>

                <div class="d-flex gap-3 mt-3">
                    <button class="btn btn-primary px-4">Guardar</button>
                    <a href="{% url 'users:profile' %}" class="btn btn-secondary px-4">Cancelar</a>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
