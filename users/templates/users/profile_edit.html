{% extends "base.html" %}

{% block title %}Editar perfil · YourSideAnime{% endblock %}

{% block content %}

<h2 class="mb-4 text-center">Editar perfil</h2>

<form method="POST" class="mx-auto" style="max-width: 500px;">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Nombre de usuario</label>
        <input type="text" name="username" value="{{ user.username }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Correo</label>
        <input type="email" name="email" value="{{ user.email }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Avatar (URL)</label>
        <input type="text" name="avatar" value="{{ profile.avatar }}" class="form-control">
    </div>

    <button class="btn btn-primary w-100 mt-3">Guardar cambios</button>

    <p class="text-center mt-3">
        <a href="{% url 'users:profile' %}">Volver al perfil</a>
    </p>
</form>

{% endblock %}
