{% load static %}

<div class="modal fade" id="addAnimeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header border-secondary">
                <h5 class="modal-title">Añadir Anime</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <form id="addAnimeForm" method="post" action="{% url 'animes:add' %}">
                    {% csrf_token %}

                    <input type="hidden" name="api_id" id="api_id">
                    <input type="hidden" name="imagen_url" id="imagen_url">
                    <input type="hidden" name="episodios_totales" id="episodios_totales">

                    <div class="row g-4">

                        <div class="col-12 col-md-4 text-center">

                            <div class="bg-secondary rounded" style="height: 220px;">
                                <img id="previewImagen"
                                     src="{% static 'img/default_anime.jpg' %}"
                                     class="w-100 h-100 rounded"
                                     style="object-fit: cover;">
                            </div>

                            <div id="ratingSection" class="mt-3 d-none">
                                <label>Rating:</label>

                                <div id="ratingStars" class="fs-3 d-flex gap-1 justify-content-center">
                                    <i class="bi bi-star star text-secondary" data-value="1"></i>
                                    <i class="bi bi-star star text-secondary" data-value="2"></i>
                                    <i class="bi bi-star star text-secondary" data-value="3"></i>
                                    <i class="bi bi-star star text-secondary" data-value="4"></i>
                                    <i class="bi bi-star star text-secondary" data-value="5"></i>
                                </div>

                                <input type="hidden" name="rating" id="ratingInput" value="0">

                            </div>

                        </div>

                        <div class="col-12 col-md-8">

                            <p class="text-white mb-1 fs-4">
                                <strong id="tituloTexto"></strong>
                            </p>
                            <input type="hidden" name="titulo" id="titulo">


                            <label class="form-label mt-3">Estado</label>
                            <select name="estado" id="estadoSelect"
                                    class="form-select bg-dark text-white border-secondary">
                                <option value="viendo">Viendo</option>
                                <option value="visto">Visto</option>
                                <option value="dropeado">Dropeado</option>
                                <option value="whitelist">Whitelist</option>
                            </select>

                            <div id="fechasSection" class="mt-3">
                                <label class="form-label">Fecha/s</label>
                                <div class="d-flex gap-2">
                                    <input type="date" name="fecha_inicio"
                                           id="fecha_inicio"
                                           class="form-control bg-dark text-white border-secondary">

                                    <input type="date" name="fecha_fin"
                                           id="fecha_fin"
                                           class="form-control bg-dark text-white border-secondary">
                                </div>
                            </div>

                            <div id="episodiosSection" class="mt-3">
                                <label class="form-label">Episodios vistos</label>
                                <input type="number" name="episodios_vistos"
                                       id="episodios_vistos"
                                       class="form-control bg-dark text-white border-secondary"
                                       min="0">
                            </div>

                        </div>

                    </div>

                </form>

            </div>

            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="addAnimeForm" class="btn btn-light">Guardar</button>
            </div>

        </div>
    </div>
</div>

<script>
    /**
     * MODAL PARA AÑADIR
     Sistema de estrellas | Mostrar o ocultar opciones depende de la categoría | Rellenar los datos no relevantes automaticamente
     **/
    document.addEventListener("DOMContentLoaded", () => {

    // Comprobación: Si no existe, no ejecutamos nada.
    const modal = document.getElementById("addAnimeModal");
    if (!modal) return;

    const stars = document.querySelectorAll("#ratingStars .star");
    const ratingInput = document.getElementById("ratingInput");

    // Detectar si el usuario hace clic a la izquierda o derecha para poder asignar medias estrellas.
    stars.forEach(star => {
        star.addEventListener("click", (e) => {
            const rect = star.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const half = x < rect.width / 2;

            const base = parseInt(star.dataset.value);
            const value = half ? base - 0.5 : base;

            ratingInput.value = value;
            actualizarEstrella(value);
        });
    });

    // Emoticonos de estrellas visual
    function actualizarEstrella(value) {
        stars.forEach(star => {
            const starValue = parseInt(star.dataset.value);

            if (value >= starValue) {
                star.className = "bi bi-star-fill star text-warning";
            }
            else if (value + 0.5 === starValue) {
                star.className = "bi bi-star-half star text-warning";
            }
            else {
                star.className = "bi bi-star star text-secondary";
            }
        });
    }

    const estadoSelect = document.getElementById("estadoSelect");
    const ratingSection = document.getElementById("ratingSection");
    const fechasSection = document.getElementById("fechasSection");
    const fechaFin = document.getElementById("fecha_fin");
    const episodiosSection = document.getElementById("episodiosSection");

    function actualizarCampos() {
        // Mostrar o ocultar datos dependiendo de la categoría seleccionada.
        const estado = estadoSelect.value;

        ratingSection.classList.add("d-none");
        fechasSection.classList.remove("d-none");
        episodiosSection.classList.remove("d-none");
        fechaFin.classList.remove("d-none");

        if (estado === "viendo") {
            ratingSection.classList.add("d-none");
            fechaFin.classList.add("d-none");
        } else if (estado === "visto") {
            ratingSection.classList.remove("d-none");
            episodiosSection.classList.add("d-none");
        } else if (estado === "whitelist") {
            ratingSection.classList.add("d-none");
            fechasSection.classList.add("d-none");
            episodiosSection.classList.add("d-none");
        } else if (estado === "dropeado") {
            ratingSection.classList.add("d-none");
            fechaFin.classList.add("d-none");
        }
    }

    estadoSelect.addEventListener("change", actualizarCampos);

    // Se rellenan datos necesarios, que no hace falta que los rellene el usuario.
    modal.addEventListener("show.bs.modal", event => {
        const button = event.relatedTarget;

        const titulo = button.dataset.titulo;

        document.getElementById("tituloTexto").textContent = titulo;
        document.getElementById("titulo").value = titulo;

        document.getElementById("api_id").value = button.dataset.apiid;
        document.getElementById("imagen_url").value = button.dataset.imagen;
        document.getElementById("episodios_totales").value = button.dataset.episodios;

        document.getElementById("previewImagen").src = button.dataset.imagen;

        actualizarCampos();
    });

});
</script>
