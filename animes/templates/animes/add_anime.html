<div class="modal fade" id="addAnimeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header border-secondary">
                <h5 class="modal-title">Añadir Anime</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <form id="addAnimeForm" method="post" action="{% url 'animes:add' %}">
                    {% csrf_token %}

                    <input type="hidden" name="api_id" id="api_id">
                    <input type="hidden" name="imagen_url" id="imagen_url">
                    <input type="hidden" name="episodios_totales" id="episodios_totales">

                    <div class="row g-4">

                        <!-- FOTO -->
                        <div class="col-12 col-md-4 text-center">
                            <div class="bg-secondary rounded" style="height: 220px;">
                                <img id="previewImagen"
                                     src="{% static 'img/default_anime.png' %}"
                                     class="w-100 h-100 rounded"
                                     style="object-fit: cover;">
                            </div>

                            <label class="mt-3">Rating:</label>
                            <div id="ratingStars" class="fs-3">
                                {% for i in "12345" %}
                                    <span class="star text-secondary" data-value="{{ forloop.counter }}">★</span>
                                {% endfor %}
                            </div>

                            <input type="hidden" name="rating" id="ratingInput" value="0">
                        </div>

                        <!-- CAMPOS -->
                        <div class="col-12 col-md-8">

                            <label class="form-label">Nombre</label>
                            <input type="text" name="titulo" id="titulo" class="form-control bg-dark text-white border-secondary">

                            <label class="form-label mt-3">Estado</label>
                            <select name="estado" class="form-select bg-dark text-white border-secondary">
                                <option value="viendo">Viendo</option>
                                <option value="visto">Visto</option>
                                <option value="dropeado">Dropeado</option>
                                <option value="whitelist">Whitelist</option>
                            </select>

                            <label class="form-label mt-3">Fechas (Inicio - Fin)</label>
                            <div class="d-flex gap-2">
                                <input type="date" name="fecha_inicio" class="form-control bg-dark text-white border-secondary">
                                <input type="date" name="fecha_fin" class="form-control bg-dark text-white border-secondary">
                            </div>

                            <label class="form-label mt-3">Episodios vistos</label>
                            <input type="number" name="episodios_vistos" class="form-control bg-dark text-white border-secondary" min="0">


                        </div>

                    </div>

                </form>

            </div>

            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="addAnimeForm" class="btn btn-light">Guardar</button>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const stars = document.querySelectorAll("#ratingStars .star");
    const ratingInput = document.getElementById("ratingInput");

    stars.forEach(star => {
        star.addEventListener("click", () => {
            const value = star.dataset.value;
            ratingInput.value = value;

            stars.forEach(s => {
                s.classList.toggle("text-warning", s.dataset.value <= value);
                s.classList.toggle("text-secondary", s.dataset.value > value);
            });
        });
    });

    const modal = document.getElementById("addAnimeModal");

    modal.addEventListener("show.bs.modal", event => {
        const button = event.relatedTarget;

        document.getElementById("titulo").value = button.dataset.titulo;
        document.getElementById("api_id").value = button.dataset.apiid;
        document.getElementById("imagen_url").value = button.dataset.imagen;
        document.getElementById("episodios_totales").value = button.dataset.episodios;

        document.getElementById("previewImagen").src = button.dataset.imagen;
    });

});
</script>
