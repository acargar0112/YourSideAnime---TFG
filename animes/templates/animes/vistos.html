{% extends "animes/base_list.html" %}

{% block title %}Vistos · YourSideAnime{% endblock %}

{% block rating %}
<div class="stars mt-2 text-center">
    {% for i in "12345" %}
        {% if forloop.counter <= anime.rating %}
            <span class="star filled">★</span>
        {% else %}
            <span class="star">★</span>
        {% endif %}
    {% endfor %}
</div>
{% endblock %}
