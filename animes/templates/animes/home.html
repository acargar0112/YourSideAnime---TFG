{% extends "base.html" %}
{% load static %}

{% block title %}Inicio · YourSideAnime{% endblock %}

{% block content %}

<div id="homeCarousel" class="carousel slide mb-5" data-bs-ride="carousel">

    <div class="carousel-indicators">
        <button type="button" data-bs-target="#homeCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#homeCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#homeCarousel" data-bs-slide-to="2"></button>
    </div>

    <div class="carousel-inner rounded shadow">

        <div class="carousel-item active">
            <img src="{% static 'img/carrusel1.png' %}" class="d-block w-100" alt="Slide 1">
        </div>

        <div class="carousel-item">
            <img src="{% static 'img/carrusel2.png' %}" class="d-block w-100" alt="Slide 2">
        </div>

        <div class="carousel-item">
            <img src="{% static 'img/carrusel3.jpg' %}" class="d-block w-100" alt="Slide 3">
        </div>

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#homeCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#homeCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>


<div class="row g-4">

    <div class="col-12 col-lg-6">
        <div class="p-4 bg-dark border border-secondary rounded shadow-sm h-100">
            <h3 class="fw-bold mb-3">Estadísticas del Perfil</h3>

            <p class="text-secondary">Próximamente: estadísticas del usuario.</p>
        </div>
    </div>

    <div class="col-12 col-lg-6">
        <div class="p-4 bg-dark border border-secondary rounded shadow-sm h-100">
            <h3 class="fw-bold mb-3">Ranking de Animes</h3>

            <p class="text-secondary">Próximamente: ranking de animes.</p>
        </div>
    </div>

</div>

{% endblock %}
