{% load static %}

<div class="modal fade" id="editAnimeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header border-secondary">
                <h5 class="modal-title">Editar Anime</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <form id="editAnimeForm" method="post">
                    {% csrf_token %}

                    <input type="hidden" name="imagen_url" id="edit_imagen_url">
                    <input type="hidden" name="episodios_totales" id="edit_episodios_totales">
                    <input type="hidden" name="return_url" id="edit_return_url">

                    <div class="row g-4">

                        <div class="col-12 col-md-4 text-center">

                            <div class="bg-secondary rounded" style="height: 220px;">
                                <img id="edit_previewImagen"
                                     src="{% static 'img/default_anime.jpg' %}"
                                     class="w-100 h-100 rounded"
                                     style="object-fit: cover;">
                            </div>

                            <div id="edit_ratingSection" class="mt-3 d-none text-center">
                                <label>Rating:</label>

                                <div id="edit_ratingStars" class="fs-3 d-flex gap-1 justify-content-center">
                                    <i class="bi bi-star edit-star text-secondary" data-value="1"></i>
                                    <i class="bi bi-star edit-star text-secondary" data-value="2"></i>
                                    <i class="bi bi-star edit-star text-secondary" data-value="3"></i>
                                    <i class="bi bi-star edit-star text-secondary" data-value="4"></i>
                                    <i class="bi bi-star edit-star text-secondary" data-value="5"></i>
                                </div>

                                <input type="hidden" name="rating" id="edit_ratingInput" value="0">

                            </div>
                        </div>

                        <div class="col-12 col-md-8">

                            <p class="text-white mb-1 fs-4">
                                <strong id="edit_tituloTexto"></strong>
                            </p>
                            <input type="hidden" name="titulo" id="edit_titulo">

                            <label class="form-label mt-3">Estado</label>
                            <select name="estado" id="edit_estado"
                                    class="form-select bg-dark text-white border-secondary">
                                <option value="viendo">Viendo</option>
                                <option value="visto">Visto</option>
                                <option value="dropeado">Dropeado</option>
                                <option value="whitelist">Whitelist</option>
                            </select>

                            <div id="edit_fechasSection" class="mt-3">
                                <label class="form-label">Fechas</label>
                                <div class="d-flex gap-2">
                                    <input type="date" name="fecha_inicio"
                                           id="edit_fecha_inicio"
                                           class="form-control bg-dark text-white border-secondary">

                                    <input type="date" name="fecha_fin"
                                           id="edit_fecha_fin"
                                           class="form-control bg-dark text-white border-secondary">
                                </div>
                            </div>

                            <div id="edit_episodiosSection" class="mt-3">
                                <label class="form-label">Episodios vistos</label>
                                <input type="number" name="episodios_vistos"
                                       id="edit_episodios_vistos"
                                       class="form-control bg-dark text-white border-secondary"
                                       min="0">
                            </div>

                        </div>

                    </div>

                </form>

            </div>

            <div class="modal-footer border-secondary">

                <button type="submit" form="editAnimeForm" class="btn btn-light">Guardar cambios</button>

                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

                <form id="deleteAnimeForm" method="post" class="m-0">
                    {% csrf_token %}
                    <input type="hidden" name="return_url" id="delete_return_url">
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                </form>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const editStars = document.querySelectorAll("#edit_ratingStars .edit-star");
    const editRatingInput = document.getElementById("edit_ratingInput");

    editStars.forEach(star => {
        star.addEventListener("click", (e) => {
            const rect = star.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const half = x < rect.width / 2;

            const base = parseInt(star.dataset.value);
            const value = half ? base - 0.5 : base;

            editRatingInput.value = value;
            actualizarEditarEstrella(value);
        });
    });

    function actualizarEditarEstrella(value) {
        editStars.forEach(star => {
            const starValue = parseInt(star.dataset.value);

            if (value >= starValue) {
                star.className = "bi bi-star-fill edit-star text-warning";
            }
            else if (value + 0.5 === starValue) {
                star.className = "bi bi-star-half edit-star text-warning";
            }
            else {
                star.className = "bi bi-star edit-star text-secondary";
            }
        });
    }

    const estadoSelect = document.getElementById("edit_estado");
    const ratingSection = document.getElementById("edit_ratingSection");
    const fechasSection = document.getElementById("edit_fechasSection");
    const fechaFin = document.getElementById("edit_fecha_fin");
    const episodiosSection = document.getElementById("edit_episodiosSection");

    function actualizarCamposEdit() {
        const estado = estadoSelect.value;

        ratingSection.classList.add("d-none");
        fechasSection.classList.remove("d-none");
        episodiosSection.classList.remove("d-none");
        fechaFin.classList.remove("d-none");

        if (estado === "viendo") {
            ratingSection.classList.add("d-none");
            fechaFin.classList.add("d-none");
        } else if (estado === "visto") {
            ratingSection.classList.remove("d-none");
            episodiosSection.classList.add("d-none");
        } else if (estado === "whitelist") {
            ratingSection.classList.add("d-none");
            fechasSection.classList.add("d-none");
            episodiosSection.classList.add("d-none");
        } else if (estado === "dropeado") {
            ratingSection.classList.add("d-none");
            fechaFin.classList.add("d-none");
        }
    }

    estadoSelect.addEventListener("change", actualizarCamposEdit);

    const editModal = document.getElementById("editAnimeModal");

    editModal.addEventListener("show.bs.modal", event => {
        const button = event.relatedTarget;

        const titulo = button.dataset.titulo;

        document.getElementById("edit_tituloTexto").textContent = titulo;
        document.getElementById("edit_titulo").value = titulo;
        document.getElementById("edit_estado").value = button.dataset.estado;
        document.getElementById("edit_episodios_vistos").value = button.dataset.episodios_vistos;
        document.getElementById("edit_imagen_url").value = button.dataset.imagen;
        document.getElementById("edit_episodios_totales").value = button.dataset.episodios_totales;
        document.getElementById("edit_previewImagen").src = button.dataset.imagen;

        const rating = parseFloat(button.dataset.rating);
        editRatingInput.value = rating;
        actualizarEditarEstrella(rating);

        document.getElementById("edit_fecha_inicio").value = button.dataset.fecha_inicio || "";
        document.getElementById("edit_fecha_fin").value = button.dataset.fecha_fin || "";
        document.getElementById("edit_return_url").value = button.dataset.returnUrl;
        document.getElementById("delete_return_url").value = button.dataset.returnUrl;

        document.getElementById("editAnimeForm").action = `/anime/${button.dataset.id}/edit/`;
        document.getElementById("deleteAnimeForm").action = `/anime/${button.dataset.id}/delete/`;

        actualizarCamposEdit();
    });

});
</script>
